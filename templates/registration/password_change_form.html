{% extends "base.html" %}

{% block title %}修改密码 | NorthTeam2 工作台{% endblock %}

{% block content %}
<section class="page-heading compact-heading">
    <p class="eyebrow">账号安全</p>
    <h1>修改密码</h1>
    <p class="heading-text">请输入当前密码，并设置一个新的登录密码。修改成功后，你会继续保持登录状态。</p>
</section>

<section class="account-panel">
    <form class="account-form" method="post">
        {% csrf_token %}

        {% if form.non_field_errors %}
            <div class="form-error">{{ form.non_field_errors }}</div>
        {% endif %}

        {% for field in form %}
            <label>
                <span>{{ field.label }}</span>
                {{ field }}
                {% if field.help_text %}
                    <div class="field-help">{{ field.help_text }}</div>
                {% endif %}
                {% for error in field.errors %}
                    <strong class="field-error">{{ error }}</strong>
                {% endfor %}
            </label>
        {% endfor %}

        <div class="account-actions">
            <a class="plain-button" href="{% url 'dashboard:home' %}">返回首页</a>
            <button class="primary-button" type="submit">保存新密码</button>
        </div>
    </form>
</section>
{% endblock %}
