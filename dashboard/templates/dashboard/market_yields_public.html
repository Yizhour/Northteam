{% extends "base.html" %}

{% block title %}中债收益率曲线{% endblock %}

{% block content %}
<style>
.page-shell{max-width:1080px;margin:0 auto;padding:28px 20px;background:#f4f7fb}.market-yield-public-page{width:min(980px,100%);margin:0 auto;padding:20px;background:#fff;border:1px solid #d8e1ec;border-radius:8px;box-shadow:0 10px 28px rgba(15,35,65,.08)}.market-yield-heading{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #d8e1ec}.market-yield-heading h2{margin:0;color:#0f2f4d;font-size:20px;line-height:1.25}.market-yield-heading span{display:block;margin-top:4px;color:#637083;font-size:12px;font-weight:700;text-transform:uppercase}.market-yield-actions{display:flex;align-items:center;gap:8px}.market-more-button{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:7px 11px;color:#12345a;background:#fff;border:1px solid #d8e1ec;border-radius:6px;cursor:pointer;font:inherit;font-size:13px;font-weight:700;text-decoration:none}.market-more-button:hover{background:#e8f1fa;border-color:#8db9df}.market-yield-meta{display:flex;flex-wrap:wrap;gap:8px;margin:-6px 0 12px;color:#637083;font-size:12px}.market-yield-table-wrap{overflow-x:auto;border:1px solid #d8e1ec;border-radius:8px}.market-yield-table{width:100%;min-width:680px;border-collapse:collapse;background:#fff;font-size:12px}.market-yield-table th,.market-yield-table td{padding:9px 10px;border-bottom:1px solid #d8e1ec;text-align:right;white-space:nowrap}.market-yield-table thead th{color:#334155;background:#eef3f8;font-size:12px;letter-spacing:0}.market-yield-table th:first-child,.market-yield-table th:nth-child(2){text-align:left}.market-yield-table tbody th{color:#12345a;font-weight:700}.market-yield-table tbody tr.previous-day{background:#fafcff}.market-yield-date{width:74px;color:#12345a;background:#eef3f8;font-weight:700;text-align:left!important;vertical-align:middle}.market-yield-table tbody tr:last-child th,.market-yield-table tbody tr:last-child td{border-bottom:0}.market-yield-empty{color:#637083;text-align:center!important}.yield-cell{font-family:"Consolas","SFMono-Regular","Microsoft YaHei",monospace;font-size:13px;font-weight:700}.yield-cell.up{color:#16a34a}.yield-cell.down{color:#dc2626}.yield-cell.flat,.yield-cell.neutral{color:#637083}@media(max-width:760px){.page-shell{padding:16px 10px}.market-yield-public-page{padding:14px}.market-yield-heading{align-items:flex-start;flex-direction:column}.market-yield-table{min-width:640px}}
</style>
<section class="panel market-yield-panel market-yield-public-page">
    <div class="panel-heading market-yield-heading">
        <div>
            <h2>中债收益率曲线</h2>
            <span>Market Rates</span>
        </div>
        <div class="market-yield-actions">
            <a class="market-more-button" href="https://indices.chinabond.com.cn/cbweb-mn/yield_main?locale=zh_CN" target="_blank" rel="noopener noreferrer">更多</a>
        </div>
    </div>
    <div id="marketYieldPublicContent"
         data-status-url="{% url 'dashboard:market_yields_public_status' %}">
        {% include "dashboard/partials/market_yield_public_content.html" %}
    </div>
</section>
<script>
(function () {
    var content = document.getElementById('marketYieldPublicContent');
    if (!content) {
        return;
    }
    var pollTimer = null;

    function schedulePoll() {
        window.clearTimeout(pollTimer);
        pollTimer = window.setTimeout(pollStatus, 30000);
    }

    function pollStatus() {
        window.fetch(content.dataset.statusUrl, {
            headers: {'X-Requested-With': 'XMLHttpRequest'},
            credentials: 'same-origin'
        })
            .then(function (response) {
                if (!response.ok) {
                    throw new Error('status failed');
                }
                return response.json();
            })
            .then(function (payload) {
                if (payload && payload.html) {
                    content.innerHTML = payload.html;
                }
                schedulePoll();
            })
            .catch(schedulePoll);
    }

    schedulePoll();
})();
</script>
{% endblock %}
