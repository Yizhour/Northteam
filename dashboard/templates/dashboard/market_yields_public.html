{% extends "base.html" %}

{% block title %}中债收益率曲线{% endblock %}

{% block content %}
<style>
.page-messages{display:grid;gap:8px;margin-bottom:18px}.market-yield-panel .page-messages{margin:-6px 0 12px}.page-message{padding:10px 12px;border-radius:6px;font-size:13px;font-weight:700}.page-message.success{color:#14532d;background:#dcfce7;border:1px solid #86efac}.page-message.error{color:#991b1b;background:#fee2e2;border:1px solid #fecaca}.page-message.info{color:#1d4f7a;background:#e8f1fa;border:1px solid #b8d5ef}.market-yield-panel{margin-bottom:22px;padding:20px}.market-yield-heading{align-items:center}.market-yield-actions{display:flex;align-items:center;gap:8px}.market-yield-heading form{margin:0}.market-refresh-button,.market-more-button,.market-copy-button{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:7px 11px;color:#12345a;background:#fff;border:1px solid #d8e1ec;border-radius:6px;cursor:pointer;font:inherit;font-size:13px;font-weight:700}.market-refresh-button:hover,.market-more-button:hover,.market-copy-button:hover{background:#e8f1fa;border-color:#8db9df}.market-refresh-button:disabled{color:#637083;background:#f3f6fa;border-color:#d8e1ec;cursor:wait}.market-yield-meta{display:flex;flex-wrap:wrap;gap:8px;margin:-6px 0 12px;color:#637083;font-size:12px}.market-yield-table-wrap{overflow-x:auto;border:1px solid #d8e1ec;border-radius:8px}.market-yield-table{width:100%;min-width:680px;border-collapse:collapse;background:#fff;font-size:12px}.market-yield-table th,.market-yield-table td{padding:9px 10px;border-bottom:1px solid #d8e1ec;text-align:right;white-space:nowrap}.market-yield-table thead th{color:#334155;background:#eef3f8;font-size:12px;letter-spacing:0}.market-yield-table th:first-child,.market-yield-table th:nth-child(2){text-align:left}.market-yield-table tbody th{color:#12345a;font-weight:700}.market-yield-table tbody tr.previous-day{background:#fafcff}.market-yield-date{width:74px;color:#12345a;background:#eef3f8;font-weight:700;text-align:left!important;vertical-align:middle}.market-yield-table tbody tr:last-child th,.market-yield-table tbody tr:last-child td{border-bottom:0}.market-yield-empty{color:#637083;text-align:center!important}.yield-cell{font-family:"Consolas","SFMono-Regular","Microsoft YaHei",monospace;font-size:13px;font-weight:700}.yield-cell.up{color:#16a34a}.yield-cell.down{color:#dc2626}.yield-cell.flat,.yield-cell.neutral{color:#637083}
</style>
<section class="panel market-yield-panel market-yield-public-page"
         data-status-url="{% url 'dashboard:market_yields_public_status' %}">
    <div class="panel-heading market-yield-heading">
        <div>
            <h2>中债收益率曲线</h2>
            <span>Market Rates</span>
        </div>
        <div class="market-yield-actions">
            <a class="market-more-button" href="https://indices.chinabond.com.cn/cbweb-mn/yield_main?locale=zh_CN" target="_blank" rel="noopener noreferrer">更多</a>
        </div>
    </div>
    {% include "dashboard/partials/market_yields.html" %}
</section>
<script>
(function () {
    var panel = document.querySelector('.market-yield-public-page');
    if (!panel) {
        return;
    }
    var pollTimer = null;

    function contentNode() {
        return document.getElementById('marketYieldContent');
    }

    function schedulePoll() {
        window.clearTimeout(pollTimer);
        pollTimer = window.setTimeout(pollStatus, 30000);
    }

    function pollStatus() {
        window.fetch(panel.dataset.statusUrl, {
            headers: {'X-Requested-With': 'XMLHttpRequest'},
            credentials: 'same-origin'
        })
            .then(function (response) {
                if (!response.ok) {
                    throw new Error('status failed');
                }
                return response.json();
            })
            .then(function (payload) {
                if (payload && payload.html) {
                    var current = contentNode();
                    if (current) {
                        current.outerHTML = payload.html;
                    }
                }
                schedulePoll();
            })
            .catch(schedulePoll);
    }

    schedulePoll();
})();
</script>
{% endblock %}
